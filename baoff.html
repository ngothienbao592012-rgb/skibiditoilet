    function render(){questionsEl.innerHTML="";questions.forEach((q,idx)=>{const card=document.createElement("section");card.className="card q-card";const title=document.createElement("h2");title.className="q-title";title.innerHTML=`${idx+1}) ${q.title} <span class="req">*</span>`;card.appendChild(title);if(q.image) addImage(card,q.image);if(q.type==="mcq"||q.type==="tf"){const opts=q.type==="tf"?["Đúng","Sai"]:q.options;opts.forEach((opt,i)=>{const id=`${q.id}_${i}`;const label=document.createElement("label");label.className="opt";label.setAttribute("for",id);label.innerHTML=`<input id="${id}" type="radio" name="${q.id}" value="${opt}" required><span class="badge">${letters[i]}</span><span>${opt}</span>`;card.appendChild(label)})}else{const input=document.createElement("input");input.className="txt";input.name=q.id;input.required=true;input.placeholder="Nhập đáp án...";card.appendChild(input)}const review=document.createElement("div");review.className="review";review.id=`review_${q.id}`;card.appendChild(review);questionsEl.appendChild(card)})}
    function updateTimer(){const m=String(Math.floor(remain/60)).padStart(2,"0"),s=String(remain%60).padStart(2,"0");timerEl.textContent=`${m}:${s}`;if(remain<=300) timerEl.classList.add("warn");if(remain<=60) timerEl.classList.add("danger")}
    function finish(auto=false){if(done) return;done=true;clearInterval(timer);const data=new FormData(form);let correct=0;questions.forEach((q)=>{const user=data.get(q.id)||"";const ok=q.type==="text"?normalizeText(user)===normalizeText(q.answer):user===q.answer;if(ok) correct++;const review=document.getElementById(`review_${q.id}`);review.style.display="block";review.innerHTML=`<p>Kết quả: <span class="${ok?"ok":"bad"}">${ok?"Đúng":"Sai"}</span></p><p>Đáp án bạn chọn: <strong>${user||"(trống)"}</strong></p><p>Đáp án đúng: <strong>${q.answer}</strong></p>`});const score=((correct/questions.length)*10).toFixed(2),perfect=Number(score)===10;summaryEl.style.display="block";summaryEl.innerHTML=`<div class="score">Điểm: ${score}/10</div><div>Số câu đúng: ${correct}/${questions.length}</div><div>${auto?"Hết giờ, hệ thống tự nộp bài.":"Bạn đã nộp bài."}</div>${perfect?`<div class="ok">Chúc mừng bạn đạt điểm tuyệt đối 10/10!</div>`:""}`;Array.from(form.elements).forEach((el)=>el.disabled=true);retryBtn.disabled=false;retryBtn.style.display="inline-block";submitBtn.disabled=true;shuffleQuestionsBtn.disabled=true;shuffleAnswersBtn.disabled=true}
    shuffleQuestionsBtn.addEventListener("click",()=>{if(done) return;if(hasAnyAnswer()&&!confirm("Bạn đã nhập một số câu trả lời. Xáo trộn sẽ làm mới biểu mẫu, bạn có muốn tiếp tục?")) return;questions=shuffleArray(structuredClone(questions));render()});
    shuffleAnswersBtn.addEventListener("click",()=>{if(done) return;if(hasAnyAnswer()&&!confirm("Bạn đã nhập một số câu trả lời. Xáo trộn sẽ làm mới biểu mẫu, bạn có muốn tiếp tục?")) return;questions=structuredClone(questions).map((q)=>{if(q.type==="mcq") q.options=shuffleArray([...q.options]);return q});render()});

    retryBtn.addEventListener("click",()=>location.reload()); render(); updateTimer();
    timer=setInterval(()=>{if(done) return;remain--;updateTimer();if(remain<=0) finish(true)},1000);
    let questions = structuredClone(baseQuestions);
    const form = document.getElementById("quizForm");
    const questionsEl = document.getElementById("questions");
    const timerEl = document.getElementById("timer");
    const submitBtn = document.getElementById("submitBtn");
    const retryBtn = document.getElementById("retryBtn");
    const summaryEl = document.getElementById("summary");
    const shuffleQuestionsBtn = document.getElementById("shuffleQuestionsBtn");
    const shuffleAnswersBtn = document.getElementById("shuffleAnswersBtn");
    let remain = 20 * 60, done = false, timer = null;
    function shuffleArray(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
    function normalizeText(s){ return (s||"").toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," "); }
    function attachImageWithFallback(imgEl, errorEl, candidates, index = 0){
      if(index >= candidates.length){
        errorEl.style.display = "block";
        return;
      }
      imgEl.src = candidates[index];
      imgEl.onerror = () => attachImageWithFallback(imgEl, errorEl, candidates, index + 1);
    }
    function addImage(card, imageKey){
      const wrap = document.createElement("div");
      wrap.className = "img-wrap";
      const img = document.createElement("img");
      img.alt = "Hình câu hỏi";
      const err = document.createElement("div");
      err.className = "img-error";
      err.textContent = "Không tải được ảnh. Hãy giữ file index.html cùng thư mục images.";
      wrap.appendChild(img);
      wrap.appendChild(err);
      card.appendChild(wrap);
      attachImageWithFallback(img, err, imageMap[imageKey] || []);
    }
    function hasAnyAnswer(){
      const data = new FormData(form);
      for(const value of data.values()){ if((value || "").toString().trim() !== "") return true; }
      return false;
    }
    function render(){
      questionsEl.innerHTML = "";
      questions.forEach((q, idx) => {
        const card = document.createElement("section");
        card.className = "card q-card";
        const title = document.createElement("h2");
        title.className = "q-title";
        title.innerHTML = `${idx + 1}) ${q.title} <span class="req">*</span>`;
        card.appendChild(title);
        if(q.imageKey) addImage(card, q.imageKey);
        if(q.type === "mcq" || q.type === "tf"){
          const opts = q.type === "tf" ? ["Đúng","Sai"] : q.options;
          opts.forEach((opt, i) => {
            const id = `${q.id}_${i}`;
            const label = document.createElement("label");
            label.className = "opt";
            label.setAttribute("for", id);
            label.innerHTML = `<input id="${id}" type="radio" name="${q.id}" value="${opt}" required><span class="badge">${letters[i]}</span><span>${opt}</span>`;
            card.appendChild(label);
          });
        } else {
          const input = document.createElement("input");
          input.className = "txt";
          input.name = q.id;
          input.required = true;
          input.placeholder = "Nhập đáp án...";
          card.appendChild(input);
        }
        const review = document.createElement("div");
        review.className = "review";
        review.id = `review_${q.id}`;
        card.appendChild(review);
        questionsEl.appendChild(card);
      });
    }
    function updateTimer(){
      const m = String(Math.floor(remain / 60)).padStart(2, "0");
      const s = String(remain % 60).padStart(2, "0");
      timerEl.textContent = `${m}:${s}`;
      if(remain <= 300) timerEl.classList.add("warn");
      if(remain <= 60) timerEl.classList.add("danger");
    }
    function finish(auto = false){
      if(done) return;
      done = true;
      clearInterval(timer);
      const data = new FormData(form);
      let correct = 0;
      questions.forEach((q) => {
        const user = data.get(q.id) || "";
        const ok = q.type === "text" ? normalizeText(user) === normalizeText(q.answer) : user === q.answer;
        if(ok) correct++;
        const review = document.getElementById(`review_${q.id}`);
        review.style.display = "block";
        review.innerHTML = `<p>Kết quả: <span class="${ok ? "ok":"bad"}">${ok ? "Đúng":"Sai"}</span></p><p>Đáp án bạn chọn: <strong>${user || "(trống)"}</strong></p><p>Đáp án đúng: <strong>${q.answer}</strong></p>`;
      });
      const score = ((correct / questions.length) * 10).toFixed(2);
      const perfect = Number(score) === 10;
      summaryEl.style.display = "block";
      summaryEl.innerHTML = `<div class="score">Điểm: ${score}/10</div><div>Số câu đúng: ${correct}/${questions.length}</div><div>${auto ? "Hết giờ, hệ thống tự nộp bài." : "Bạn đã nộp bài."}</div>${perfect ? `<div class="ok">Chúc mừng bạn đạt điểm tuyệt đối 10/10!</div>` : ""}`;
      Array.from(form.elements).forEach((el) => el.disabled = true);
      retryBtn.disabled = false;
      retryBtn.style.display = "inline-block";
      submitBtn.disabled = true;
      shuffleQuestionsBtn.disabled = true;
      shuffleAnswersBtn.disabled = true;
    }
    shuffleQuestionsBtn.addEventListener("click", () => {
      if(done) return;
      if(hasAnyAnswer() && !confirm("Bạn đã nhập một số câu trả lời. Xáo trộn sẽ làm mới biểu mẫu, bạn có muốn tiếp tục?")) return;
      questions = shuffleArray(structuredClone(questions));
      render();
    });
    shuffleAnswersBtn.addEventListener("click", () => {
      if(done) return;
      if(hasAnyAnswer() && !confirm("Bạn đã nhập một số câu trả lời. Xáo trộn sẽ làm mới biểu mẫu, bạn có muốn tiếp tục?")) return;
      questions = structuredClone(questions).map((q) => {
        if(q.type === "mcq") q.options = shuffleArray([...q.options]);
        return q;
      });
      render();
    });
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      if(done) return;
      if(!form.checkValidity()){
        form.reportValidity();
        return;
      }
      finish(false);
    });
    retryBtn.addEventListener("click", () => location.reload());
    render();
    updateTimer();
    timer = setInterval(() => {
      if(done) return;
      remain--;
      updateTimer();
      if(remain <= 0) finish(true);
    }, 1000);
  </script>
